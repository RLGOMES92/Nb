function ModalImportarPlanilha({ onImportar, onClose, inline=false }) {
  const [etapa, setEtapa] = useState(1); // 1=upload, 2=mapear, 3=preview
  const [arquivo, setArquivo] = useState(null);
  const [planilhaLinhas, setPlanilhaLinhas] = useState([]); // rows brutas [{col:val}]
  const [colunas, setColunas] = useState([]); // nomes das colunas detectadas
  const [mapa, setMapa] = useState({             // mapeamento campo → coluna da planilha
    nome: '', spec: '', qtd: '', preco1: '', preco5: '', preco10: '', modalidade: '',
  });
  const [preview, setPreview] = useState([]);    // produtos parseados
  const [dragOver, setDragOver] = useState(false);
  const [modo, setModo] = useState('substituir'); // 'substituir' | 'mesclar'
  const fileRef = useRef(null);

  const CAMPOS = [
    { key:'nome',       label:'Nome do Produto',        obrigatorio:true,  hint:'Ex: Dell Latitude 5440' },
    { key:'spec',       label:'Especificação / Config', obrigatorio:false, hint:'Ex: i5 / 16GB / 256GB' },
    { key:'qtd',        label:'Qtd em Estoque',         obrigatorio:false, hint:'Ex: 10' },
    { key:'preco1',     label:'Preço 1–4 un (R$/mês)',  obrigatorio:false, hint:'Ex: 395' },
    { key:'preco5',     label:'Preço 5–9 un (R$/mês)',  obrigatorio:false, hint:'Ex: 365' },
    { key:'preco10',    label:'Preço 10+ un (R$/mês)',  obrigatorio:false, hint:'Ex: 325' },
    { key:'modalidade', label:'Modalidade',             obrigatorio:false, hint:'Locação / Venda' },
  ];

  // Lê o arquivo e extrai linhas
  const lerArquivo = (file) => {
    if (!file) return;
    const ext = file.name.split('.').pop().toLowerCase();
    if (!['xlsx','xls','csv','ods'].includes(ext)) {
      alert('Formato não suportado. Use .xlsx, .xls, .csv ou .ods');
      return;
    }
    setArquivo(file);
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const wb = XLSX.read(e.target.result, { type: 'array' });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
        if (rows.length === 0) { alert('A planilha está vazia ou sem cabeçalho.'); return; }
        const cols = Object.keys(rows[0]);
        setColunas(cols);
        setPlanilhaLinhas(rows);
        // Auto-mapeamento inteligente por nome parecido
        const autoMapa = {};
        const tentativas = {
          nome:       ['nome','produto','name','equipamento','descricao','descrição','item','modelo'],
          spec:       ['spec','especificacao','especificação','config','configuracao','configuração','detalhe','processador'],
          qtd:        ['qtd','quantidade','estoque','qtde','qty','stock','total'],
          preco1:     ['preco1','preco_1','preco','preço','valor','price','mensalidade','mensalidade_1','1un','1-4'],
          preco5:     ['preco5','preco_5','valor5','price5','5un','5-9'],
          preco10:    ['preco10','preco_10','valor10','price10','10un','10+'],
          modalidade: ['modalidade','tipo','category','categoria','mode'],
        };
        Object.entries(tentativas).forEach(([campo, keywords]) => {
          const found = cols.find(c =>
            keywords.some(k => c.toLowerCase().replace(/[\s_\-]/g,'').includes(k.replace(/[\s_\-]/g,'')))
          );
          autoMapa[campo] = found || '';
        });
        setMapa(autoMapa);
        setEtapa(2);
      } catch(err) {
        alert('Erro ao ler o arquivo. Verifique se é uma planilha válida.\n\n'+err.message);
      }
    };
    reader.readAsArrayBuffer(file);
  };

  const handleDrop = (e) => {
    e.preventDefault(); setDragOver(false);
    const file = e.dataTransfer.files[0];
    lerArquivo(file);
  };

  // Gera preview dos produtos com base no mapeamento
  const gerarPreview = () => {
    if (!mapa.nome) { alert('Mapeie ao menos o campo "Nome do Produto".'); return; }
    const produtos = planilhaLinhas.map((row, i) => {
      const nome = String(row[mapa.nome] || '').trim();
      if (!nome) return null;
      const qtd = parseInt(row[mapa.qtd]) || 0;
      const p1  = parseFloat(String(row[mapa.preco1] || '0').replace(',','.').replace(/[^0-9.]/g,'')) || 0;
      const p5  = parseFloat(String(row[mapa.preco5]  || '0').replace(',','.').replace(/[^0-9.]/g,'')) || (p1 ? p1 * 0.93 : 0);
      const p10 = parseFloat(String(row[mapa.preco10] || '0').replace(',','.').replace(/[^0-9.]/g,'')) || (p1 ? p1 * 0.85 : 0);
      const modalRaw = String(row[mapa.modalidade] || '').trim();
      const modalidade = modalRaw
        ? (/venda/i.test(modalRaw) ? 'Venda' : /ambos|ambas|loc.*vend|vend.*loc/i.test(modalRaw) ? 'Locação/Venda' : 'Locação')
        : 'Locação';
      return {
        _linha: i + 2,
        _ok: !!nome,
        id: `NB-IMP-${Date.now()}-${i}`,
        nome,
        spec: mapa.spec ? String(row[mapa.spec] || '').trim() : '',
        qtdEstoque: qtd,
        precos: { 1: p1, 5: p5 || p1, 10: p10 || p5 || p1 },
        prazosPadrao: [12, 24, 36],
        modalidade,
      };
    }).filter(Boolean);
    setPreview(produtos);
    setEtapa(3);
  };

  const confirmarImportacao = () => {
    const validos = preview.filter(p => p.nome);
    onImportar(validos, modo);
    onClose();
  };

  const precoOk  = p => p.precos[1] > 0;
  const rowClass = p => !p.nome ? 'row-err' : !precoOk(p) ? 'row-warn' : 'row-ok';
  const comPreco = preview.filter(precoOk).length;
  const semPreco = preview.filter(p => !precoOk(p)).length;

  const Wrapper = inline
    ? ({children}) => <div className="card" style={{maxWidth:'100%'}}>{children}</div>
    : ({children}) => (
        <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
          <div className="modal" style={{maxWidth:680}} onClick={e=>e.stopPropagation()}>{children}</div>
        </div>
      );

  return (
    <Wrapper>
        {/* Indicador de etapas */}
        <div className="step-indicator">
          {['1. Upload','2. Mapear Colunas','3. Confirmar'].map((l,i)=>(
            <div key={i} className={`step-ind-item${etapa===i+1?' active':etapa>i+1?' done':''}`}>
              {etapa>i+1?'✓ ':''}{l}
            </div>
          ))}
        </div>

        {/* ── ETAPA 1: UPLOAD ── */}
        {etapa === 1 && (
          <div>
            <div className="modal-title">📊 Importar Planilha de Estoque</div>
            <div className="modal-sub">Carregue sua planilha do Excel, CSV ou ODS com os produtos da empresa.</div>

            <div
              className={`import-drop-zone${dragOver?' drag-over':''}`}
              onDragOver={e=>{e.preventDefault();setDragOver(true)}}
              onDragLeave={()=>setDragOver(false)}
              onDrop={handleDrop}
              onClick={()=>fileRef.current?.click()}
            >
              <span className="dz-icon">📂</span>
              <h3>Arraste a planilha aqui ou clique para selecionar</h3>
              <p>Formatos aceitos: <strong>.xlsx · .xls · .csv · .ods</strong></p>
              <button className="btn btn-primary" onClick={e=>{e.stopPropagation();fileRef.current?.click()}}>
                📁 Escolher Arquivo
              </button>
              <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv,.ods" style={{display:'none'}}
                onChange={e=>lerArquivo(e.target.files[0])}/>
            </div>

            {/* Guia de formato esperado */}
            <div style={{marginTop:16}}>
              <div style={{fontSize:12,fontWeight:700,color:'var(--navy)',marginBottom:8}}>
                📋 Formato recomendado da planilha:
              </div>
              <div style={{overflowX:'auto'}}>
                <table className="import-preview-table">
                  <thead>
                    <tr>
                      <th>Nome</th><th>Especificação</th><th>Qtd</th>
                      <th>Preco1</th><th>Preco5</th><th>Preco10</th><th>Modalidade</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr className="row-ok">
                      <td>Dell Latitude 5440</td><td>i5 / 16GB / 256GB</td><td>8</td>
                      <td>395</td><td>365</td><td>325</td><td>Locação</td>
                    </tr>
                    <tr className="row-ok">
                      <td>MacBook Air M2</td><td>M2 / 8GB / 256GB</td><td>3</td>
                      <td>890</td><td>820</td><td>750</td><td>Locação</td>
                    </tr>
                  </tbody>
                </table>
              </div>
              <div className="ibox blue" style={{marginTop:10,fontSize:11}}>
                <span>💡</span>
                <div>A planilha <strong>não precisa ter esses nomes de coluna exatos</strong> — na próxima etapa você vai mapear cada campo manualmente. Se tiver só uma coluna de preço, ela será usada para todos os volumes.</div>
              </div>
            </div>

            {/* Botão baixar modelo */}
            <div style={{marginTop:12,textAlign:'center'}}>
              <button className="btn btn-outline btn-sm" onClick={()=>{
                const ws = XLSX.utils.aoa_to_sheet([
                  ['Nome','Especificacao','Qtd_Estoque','Preco_1_4_un','Preco_5_9_un','Preco_10_mais_un','Modalidade'],
                  ['Dell Latitude 5440','i5-1335U / 16GB / 256GB SSD',8,395,365,325,'Locação'],
                  ['Lenovo ThinkPad E14','i7-1355U / 16GB / 512GB SSD',5,480,445,395,'Locação'],
                  ['HP ProBook 445 G10','Ryzen 5 / 8GB / 256GB SSD',12,340,310,278,'Locação'],
                  ['MacBook Air M2','Apple M2 / 8GB / 256GB SSD',3,890,820,750,'Locação'],
                ]);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, 'Estoque');
                XLSX.writeFile(wb, 'modelo_estoque_nb.xlsx');
              }}>
                ⬇️ Baixar Planilha Modelo (.xlsx)
              </button>
            </div>

            <div className="modal-btns" style={{marginTop:16}}>
              <button className="btn btn-outline" style={{flex:1}} onClick={onClose}>Cancelar</button>
            </div>
          </div>
        )}

        {/* ── ETAPA 2: MAPEAR COLUNAS ── */}
        {etapa === 2 && (
          <div>
            <div className="modal-title">🗂️ Mapear Colunas</div>
            <div className="modal-sub">
              Planilha: <strong>{arquivo?.name}</strong> · {planilhaLinhas.length} linhas detectadas.
              Associe cada campo do app com a coluna correspondente na sua planilha.
            </div>

            <div className="ibox green" style={{marginBottom:14}}>
              <span>✅</span>
              <span>Mapeamento automático aplicado. Revise e ajuste se necessário.</span>
            </div>

            {CAMPOS.map(campo => (
              <div key={campo.key} className="col-map-row">
                <div>
                  <div className="col-map-label">
                    {campo.label}
                    {campo.obrigatorio && <span style={{color:'var(--danger)'}}> *</span>}
                  </div>
                  <div style={{fontSize:10,color:'var(--slate)'}}>{campo.hint}</div>
                </div>
                <select
                  className="input"
                  value={mapa[campo.key]}
                  onChange={e=>setMapa(prev=>({...prev,[campo.key]:e.target.value}))}
                >
                  <option value="">— Não mapear —</option>
                  {colunas.map(c=>(
                    <option key={c} value={c}>{c}{planilhaLinhas[0]?.[c]!==undefined?` (ex: ${String(planilhaLinhas[0][c]).slice(0,20)})`:''}</option>
                  ))}
                </select>
              </div>
            ))}

            <div className="divider"/>
            <div style={{fontSize:12,fontWeight:700,color:'var(--navy)',marginBottom:8}}>⚙️ Modo de Importação</div>
            <div style={{display:'flex',gap:8,marginBottom:14,flexWrap:'wrap'}}>
              <button
                className={`btn${modo==='substituir'?' btn-danger':' btn-outline'}`}
                onClick={()=>setModo('substituir')}
                style={{flex:1}}
              >
                🔄 Substituir Tudo
                <div style={{fontSize:10,fontWeight:400,display:'block',marginTop:2}}>Apaga catálogo atual e importa tudo da planilha</div>
              </button>
              <button
                className={`btn${modo==='mesclar'?' btn-primary':' btn-outline'}`}
                onClick={()=>setModo('mesclar')}
                style={{flex:1}}
              >
                ➕ Mesclar / Adicionar
                <div style={{fontSize:10,fontWeight:400,display:'block',marginTop:2}}>Mantém produtos existentes e adiciona novos</div>
              </button>
            </div>

            <div className="modal-btns">
              <button className="btn btn-outline" style={{flex:1}} onClick={()=>setEtapa(1)}>← Voltar</button>
              <button className="btn btn-primary" style={{flex:2}} onClick={gerarPreview}
                disabled={!mapa.nome}>
                Ver Preview →
              </button>
            </div>
          </div>
        )}

        {/* ── ETAPA 3: PREVIEW + CONFIRMAR ── */}
        {etapa === 3 && (
          <div>
            <div className="modal-title">✅ Confirmar Importação</div>
            <div className="modal-sub">
              Revise os dados antes de importar. Modo: <strong>{modo==='substituir'?'Substituir tudo':'Mesclar/Adicionar'}</strong>.
            </div>

            {/* Estatísticas */}
            <div className="import-stat">
              <div className="import-stat-box">
                <div className="isv" style={{color:'var(--navy)'}}>{preview.length}</div>
                <div className="isl">Total de Linhas</div>
              </div>
              <div className="import-stat-box">
                <div className="isv" style={{color:'var(--success)'}}>{comPreco}</div>
                <div className="isl">Com Preço ✅</div>
              </div>
              <div className="import-stat-box">
                <div className="isv" style={{color:'var(--warn)'}}>{semPreco}</div>
                <div className="isl">Sem Preço ⚠️</div>
              </div>
              <div className="import-stat-box">
                <div className="isv" style={{color:'var(--success)'}}>{preview.filter(p=>p.qtdEstoque>0).length}</div>
                <div className="isl">Com Estoque</div>
              </div>
            </div>

            {semPreco > 0 && (
              <div className="ibox warn" style={{marginBottom:12}}>
                <span>⚠️</span>
                <span>{semPreco} produto(s) serão importados <strong>sem preço configurado</strong>. Você poderá editar depois manualmente.</span>
              </div>
            )}

            {modo === 'substituir' && (
              <div className="ibox red" style={{marginBottom:12}}>
                <span>🔴</span>
                <span>Modo <strong>Substituir</strong>: o catálogo atual será <strong>completamente substituído</strong> pelos dados da planilha. Esta ação não pode ser desfeita.</span>
              </div>
            )}

            <div style={{overflowX:'auto',maxHeight:340,overflowY:'auto'}}>
              <table className="import-preview-table">
                <thead>
                  <tr>
                    <th>#</th><th>Nome do Produto</th><th>Spec</th>
                    <th>Qtd</th><th>R$/1un</th><th>R$/5un</th><th>R$/10un</th><th>Modal.</th>
                  </tr>
                </thead>
                <tbody>
                  {preview.map((p,i) => (
                    <tr key={i} className={rowClass(p)}>
                      <td style={{color:'var(--slate)',fontSize:10}}>{p._linha}</td>
                      <td style={{fontWeight:700,color:'var(--navy)'}}>{p.nome}</td>
                      <td style={{fontSize:11,color:'var(--slate)'}}>{p.spec||'—'}</td>
                      <td style={{textAlign:'center'}}>
                        <span className={`qtd-badge ${p.qtdEstoque===0?'zero':p.qtdEstoque<=3?'low':'ok'}`}>
                          {p.qtdEstoque}
                        </span>
                      </td>
                      <td style={{textAlign:'center',fontSize:11}}>{p.precos[1]>0?R$(p.precos[1]):<span style={{color:'var(--warn)'}}>—</span>}</td>
                      <td style={{textAlign:'center',fontSize:11}}>{p.precos[5]>0?R$(p.precos[5]):<span style={{color:'var(--slate)'}}>—</span>}</td>
                      <td style={{textAlign:'center',fontSize:11}}>{p.precos[10]>0?R$(p.precos[10]):<span style={{color:'var(--slate)'}}>—</span>}</td>
                      <td><span className="badge badge-blue">{p.modalidade}</span></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>

            <div className="modal-btns" style={{marginTop:16}}>
              <button className="btn btn-outline" style={{flex:1}} onClick={()=>setEtapa(2)}>← Voltar</button>
              <button className="btn btn-success" style={{flex:2}} onClick={confirmarImportacao}
                disabled={preview.length===0}>
                ✅ Importar {preview.length} Produto(s)
              </button>
            </div>
          </div>
        )}
    </Wrapper>
  );
}

/* ══════════════════════════════════════════
   TELA ESTOQUE — com importação de planilha
══════════════════════════════════════════ */
function TelaEstoque({catalogo, setCatalogo, config, toast}) {
  const [editando,    setEditando]    = useState(null);
  const [busca,       setBusca]       = useState('');
  const [confirmDel,  setConfirmDel]  = useState(null);
  const [abaAtiva,    setAbaAtiva]    = useState('catalogo'); // 'catalogo' | 'importar'
  const [confirmLimpar, setConfirmLimpar] = useState(false);
  const minEstoque = config.alertaEstoqueMinimoQtd || 3;

  const filtrados = catalogo.filter(p =>
    p.nome.toLowerCase().includes(busca.toLowerCase()) ||
    (p.spec||'').toLowerCase().includes(busca.toLowerCase())
  );

  const handleSave = (prod) => {
    setCatalogo(prev => prev.some(p=>p.id===prod.id) ? prev.map(p=>p.id===prod.id?prod:p) : [...prev, prod]);
    setEditando(null);
    toast('Produto salvo!', 'success');
  };

  const handleDelete = (id) => {
    setCatalogo(prev => prev.filter(p=>p.id!==id));
    setConfirmDel(null);
    toast('Produto removido.', 'info');
  };

  const handleImportar = (produtos, modo) => {
    if (modo === 'substituir') {
      setCatalogo(produtos);
      toast(`✅ Catálogo substituído! ${produtos.length} produto(s) importado(s).`, 'success');
    } else {
      // Mesclar: adiciona os que não existem pelo nome (case-insensitive)
      setCatalogo(prev => {
        const nomesExistentes = prev.map(p=>p.nome.toLowerCase().trim());
        const novos = produtos.filter(p => !nomesExistentes.includes(p.nome.toLowerCase().trim()));
        const atualizados = produtos.filter(p => nomesExistentes.includes(p.nome.toLowerCase().trim()));
        // Para os que já existem, atualiza qtd e preços mas mantém o id original
        const catalogoAtualizado = prev.map(ex => {
          const imp = atualizados.find(a=>a.nome.toLowerCase().trim()===ex.nome.toLowerCase().trim());
          return imp ? {...ex, qtdEstoque:imp.qtdEstoque, precos:imp.precos, spec:imp.spec||ex.spec, modalidade:imp.modalidade||ex.modalidade} : ex;
        });
        return [...catalogoAtualizado, ...novos];
      });
      toast(`✅ Mesclado! ${produtos.length} produto(s) processado(s).`, 'success');
    }
    setAbaAtiva('catalogo');
  };

  // Exportar catálogo atual para Excel
  const exportarCatalogo = () => {
    const rows = catalogo.map(p => ({
      Nome:         p.nome,
      Especificacao: p.spec || '',
      Qtd_Estoque:  p.qtdEstoque,
      Preco_1_4_un: p.precos[1] || 0,
      Preco_5_9_un: p.precos[5] || 0,
      Preco_10_mais_un: p.precos[10] || 0,
      Modalidade:   p.modalidade,
    }));
    const ws = XLSX.utils.json_to_sheet(rows);
    // Larguras de coluna
    ws['!cols'] = [{wch:30},{wch:35},{wch:12},{wch:14},{wch:14},{wch:16},{wch:12}];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Estoque');
    XLSX.writeFile(wb, `estoque_${new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')}.xlsx`);
    toast('📥 Planilha exportada!', 'success');
  };

  const qtdBadge = (qtd) => {
    if (qtd === 0) return <span className="qtd-badge zero">⚠️ Sem estoque</span>;
    if (qtd <= minEstoque) return <span className="qtd-badge low">🟡 {qtd} un — baixo</span>;
    return <span className="qtd-badge ok">✅ {qtd} un</span>;
  };

  // Stats rápidas
  const totalProdutos  = catalogo.length;
  const totalUnidades  = catalogo.reduce((s,p)=>s+p.qtdEstoque,0);
  const semEstoqueN    = catalogo.filter(p=>p.qtdEstoque===0).length;
  const estoqueBaixoN  = catalogo.filter(p=>p.qtdEstoque>0&&p.qtdEstoque<=minEstoque).length;

  return (
    <div className="main">

      {/* ── STATS ── */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(110px,1fr))',gap:10,marginBottom:14}}>
        {[
          {v:totalProdutos, l:'Produtos',    cor:'var(--navy)'},
          {v:totalUnidades, l:'Unidades',    cor:'var(--electric)'},
          {v:semEstoqueN,   l:'Sem Estoque', cor:semEstoqueN>0?'var(--danger)':'var(--success)'},
          {v:estoqueBaixoN, l:'Est. Baixo',  cor:estoqueBaixoN>0?'var(--warn)':'var(--success)'},
        ].map((s,i)=>(
          <div key={i} className="metric-box">
            <div className="ml">{s.l}</div>
            <div className="mv" style={{color:s.cor}}>{s.v}</div>
          </div>
        ))}
      </div>

      {/* ── ABAS ── */}
      <div className="tabs" style={{marginBottom:14}}>
        <button className={`tab${abaAtiva==='catalogo'?' active':''}`} onClick={()=>setAbaAtiva('catalogo')}>
          📦 Catálogo ({catalogo.length})
        </button>
        <button className={`tab${abaAtiva==='importar'?' active':''}`} onClick={()=>setAbaAtiva('importar')}>
          📊 Importar Planilha
        </button>
      </div>

      {/* ══════════ ABA CATÁLOGO ══════════ */}
      {abaAtiva === 'catalogo' && (
        <div className="card">
          {/* Barra de ações */}
          <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:14,flexWrap:'wrap'}}>
            <div style={{flex:1,minWidth:180}}>
              <input className="input" placeholder="🔍 Buscar produto..." value={busca} onChange={e=>setBusca(e.target.value)}/>
            </div>
            <button className="btn btn-success" onClick={()=>setEditando({})}>➕ Novo</button>
            <button className="btn btn-outline" onClick={exportarCatalogo} title="Exportar para Excel">📥 Exportar .xlsx</button>
            <button className="btn btn-danger btn-sm" onClick={()=>setConfirmLimpar(true)} title="Limpar catálogo">🗑️ Limpar</button>
          </div>

          {filtrados.length === 0 ? (
            <div className="empty">
              <div className="eicon">📦</div>
              <p>{catalogo.length===0?'Catálogo vazio. Importe uma planilha ou adicione produtos manualmente.':'Nenhum produto encontrado para essa busca.'}</p>
              {catalogo.length===0 && (
                <button className="btn btn-primary" style={{marginTop:12}} onClick={()=>setAbaAtiva('importar')}>
                  📊 Importar Planilha
                </button>
              )}
            </div>
          ) : (
            <div className="estoque-grid">
              {filtrados.map(prod => {
                const cls = prod.qtdEstoque===0?'sem-estoque':prod.qtdEstoque<=minEstoque?'estoque-baixo':'';
                return (
                  <div key={prod.id} className={`estoque-item ${cls}`}>
                    <div className="ei-info">
                      <div style={{display:'flex',alignItems:'center',gap:7,flexWrap:'wrap'}}>
                        <span className="ei-nome">{prod.nome}</span>
                        <span className="badge badge-blue">{prod.modalidade}</span>
                        {qtdBadge(prod.qtdEstoque)}
                      </div>
                      {prod.spec && <div className="ei-spec">{prod.spec}</div>}
                      <div className="ei-meta">
                        {/* Usa faixas novas se existir, senão fallback legado */}
                        {(prod.faixas && prod.faixas.length > 0 ? prod.faixas : Object.entries(prod.precos||{}).filter(([,v])=>v>0).sort(([a],[b])=>Number(a)-Number(b)).map(([k,v])=>({qtdMin:Number(k),qtdMax:9999,preco:v}))).map((f, i, arr) => {
                          const p = f.preco || 0;
                          const base = arr[0]?.preco || 0;
                          const desc = base > 0 && i > 0 && p > 0 ? Math.round((1 - p/base)*100*10)/10 : 0;
                          const isUlt = i === arr.length - 1;
                          const label = isUlt ? `${f.qtdMin}+ un` : `${f.qtdMin}–${f.qtdMax} un`;
                          return (
                            <div key={i} className="estoque-meta-box">
                              <div className="mval">{R$(p)}</div>
                              {desc > 0 && <div style={{fontSize:9,color:'var(--success)',fontWeight:700,lineHeight:1.2}}>-{desc}%</div>}
                              <div className="mlabel">{label}/mês</div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                    <div className="ei-actions">
                      <button className="btn btn-warn btn-sm" onClick={()=>setEditando(prod)}>✏️</button>
                      <button className="btn btn-danger btn-sm" onClick={()=>setConfirmDel(prod)}>🗑️</button>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      {/* ══════════ ABA IMPORTAR ══════════ */}
      {abaAtiva === 'importar' && (
        <ModalImportarPlanilha
          onImportar={handleImportar}
          onClose={()=>setAbaAtiva('catalogo')}
          inline={true}
        />
      )}

      {/* Modais */}
      {editando !== null && (
        <ModalEditarProduto prod={editando} onSave={handleSave} onClose={()=>setEditando(null)}/>
      )}
      {confirmDel && (
        <div className="overlay" onClick={()=>setConfirmDel(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-title">🗑️ Remover Produto</div>
            <div className="modal-sub">Remover <strong>{confirmDel.nome}</strong> do catálogo?</div>
            <div className="modal-btns">
              <button className="btn btn-outline" style={{flex:1}} onClick={()=>setConfirmDel(null)}>Cancelar</button>
              <button className="btn btn-danger" style={{flex:1}} onClick={()=>handleDelete(confirmDel.id)}>Remover</button>
            </div>
          </div>
        </div>
      )}
      {confirmLimpar && (
        <div className="overlay" onClick={()=>setConfirmLimpar(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-title">🗑️ Limpar Catálogo</div>
            <div className="modal-sub">Isso vai remover <strong>todos os {catalogo.length} produtos</strong> do catálogo. Essa ação não pode ser desfeita.</div>
            <div className="modal-btns">
              <button className="btn btn-outline" style={{flex:1}} onClick={()=>setConfirmLimpar(false)}>Cancelar</button>
              <button className="btn btn-danger" style={{flex:2}} onClick={()=>{setCatalogo([]);setConfirmLimpar(false);toast('Catálogo limpo.','info')}}>🗑️ Limpar Tudo</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════
   PASSO 1 — CLIENTE
══════════════════════════════════════════ */
function Passo1({dados, onChange, onNext, toast}) {
  const [loading, setLoading] = useState(false);
  const [cnpjStatus, setCnpjStatus] = useState(null);
  const [errors, setErrors] = useState({});

  const consultarCNPJ = async () => {
    const raw = dados.cnpj.replace(/\D/g,'');
    if (raw.length !== 14) { toast('CNPJ precisa ter 14 dígitos.','error'); return; }
    setLoading(true); setCnpjStatus(null);
    try {
      const res = await fetch(`https://brasilapi.com.br/api/cnpj/v1/${raw}`);
      if (!res.ok) throw new Error();
      const d = await res.json();
      const telFmt = d.ddd_telefone_1 ? formatPhone(d.ddd_telefone_1.replace(/\D/g,'')) : '';
      onChange({ razaoSocial:d.razao_social||'', nomeFantasia:d.nome_fantasia||'', statusReceita:d.descricao_situacao_cadastral||'ATIVA',
        email:dados.email||d.email||'', telefone:dados.telefone||telFmt, cidade:d.municipio||'', uf:d.uf||'' });
      setCnpjStatus('ok'); toast('Empresa encontrada!','success');
    } catch { setCnpjStatus('error'); toast('CNPJ não encontrado. Preencha manualmente.','error'); }
    finally { setLoading(false); }
  };

  const validate = () => {
    const e = {};
    if (!dados.cnpj || dados.cnpj.replace(/\D/g,'').length < 14) e.cnpj = 'CNPJ obrigatório (14 dígitos)';
    if (!dados.responsavel?.trim()) e.responsavel = 'Campo obrigatório';
    if (!dados.email?.trim()) e.email = 'Campo obrigatório';
    else if (!/\S+@\S+\.\S+/.test(dados.email)) e.email = 'E-mail inválido';
    if (!dados.telefone?.trim()) e.telefone = 'Campo obrigatório';
    setErrors(e); return Object.keys(e).length === 0;
  };

  const statusMap = {'ATIVA':'badge-ok','BAIXADA':'badge-err','SUSPENSA':'badge-warn','INAPTA':'badge-err'};
  return (
    <div>
      <div className="card">
        <div className="card-title"><div className="icon">🏢</div>Dados da Empresa</div>
        <div className="form-row" style={{marginBottom:10}}>
          <FG label="CNPJ" req err={errors.cnpj}>
            <div className="input-group">
              <input className={`input${errors.cnpj?' err':''}`} placeholder="00.000.000/0001-00" value={dados.cnpj}
                onChange={e=>onChange({cnpj:formatCNPJ(e.target.value)})} onKeyDown={e=>e.key==='Enter'&&consultarCNPJ()}/>
              <button className="btn btn-primary" onClick={consultarCNPJ} disabled={loading} style={{flexShrink:0}}>
                {loading?<><div className="spinner"/>Buscando</>:'🔍 Consultar'}
              </button>
            </div>
          </FG>
        </div>
        {cnpjStatus==='ok' && dados.razaoSocial && (
          <div className="ibox green" style={{marginBottom:12}}>
            <span>✅</span>
            <div>
              <strong>{dados.razaoSocial}</strong>{dados.nomeFantasia && ` — ${dados.nomeFantasia}`}
              {dados.statusReceita && <span className={`badge ${statusMap[dados.statusReceita?.toUpperCase()]||'badge-warn'}`} style={{marginLeft:8}}>{dados.statusReceita}</span>}
              {dados.cidade && <><br/><span style={{fontSize:11,color:'#065f46'}}>📍 {dados.cidade}/{dados.uf}</span></>}
            </div>
          </div>
        )}
        {cnpjStatus==='error' && <div className="ibox warn" style={{marginBottom:12}}><span>⚠️</span> CNPJ não encontrado. Preencha manualmente.</div>}
        <div className="form-row c2">
          <Inp label="Razão Social" value={dados.razaoSocial} onChange={e=>onChange({razaoSocial:e.target.value})} readOnly={cnpjStatus==='ok'}/>
          <Inp label="Nome Fantasia" value={dados.nomeFantasia} onChange={e=>onChange({nomeFantasia:e.target.value})} readOnly={cnpjStatus==='ok'}/>
        </div>
      </div>
      <div className="card">
        <div className="card-title"><div className="icon">👤</div>Contato do Responsável</div>
        <div className="form-row"><Inp label="Nome do Responsável" req value={dados.responsavel} onChange={e=>onChange({responsavel:e.target.value})} err={errors.responsavel}/></div>
        <div className="form-row c2">
          <Inp label="E-mail" req type="email" value={dados.email} onChange={e=>onChange({email:e.target.value})} err={errors.email}/>
          <FG label="Telefone / WhatsApp" req err={errors.telefone}>
            <input className={`input${errors.telefone?' err':''}`} value={dados.telefone} onChange={e=>onChange({telefone:formatPhone(e.target.value)})} placeholder="(11) 99999-0000"/>
          </FG>
        </div>
      </div>
      <div className="nav-btns"><div/><button className="btn btn-primary btn-lg" onClick={()=>{if(validate())onNext();}}>Próximo: Produtos →</button></div>
    </div>
  );
}

/* ══════════════════════════════════════════
   PASSO 2 — PRODUTOS
══════════════════════════════════════════ */
function Passo2({catalogo, itens, onAddItem, onRemoveItem, onEditItem, onBack, onNext, toast}) {
  const [aba, setAba]                 = useState('estoque');
  const [prodSel, setProdSel]         = useState('');
  const [nome, setNome]               = useState('');
  const [spec, setSpec]               = useState('');
  const [fornecedor, setFornecedor]   = useState('');
  const [precoManual, setPrecoManual] = useState('');
  const [qtd, setQtd]                 = useState(1);
  const [prazos, setPrazos]           = useState([]);
  const [prazoCustom, setPrazoCustom] = useState('');
  const [descTipo, setDescTipo]       = useState('%');
  const [descVal, setDescVal]         = useState('');
  const [preview, setPreview]         = useState({});
  const [editItem, setEditItem]       = useState(null);

  const disponiveis = catalogo.filter(p => p.qtdEstoque > 0);
  const semEstoque  = catalogo.filter(p => p.qtdEstoque === 0);

  useEffect(() => {
    const dv = parseFloat(descVal.replace(',','.')) || 0;
    const pv = {};
    const pc = [...new Set([...prazos, ...(prazoCustom?[parseInt(prazoCustom)]:[])])].filter(Boolean);
    if (aba==='estoque' && prodSel) {
      const prod = catalogo.find(p=>p.id===prodSel);
      if (prod) pc.forEach(p => { pv[p] = aplicaDesc(lookupPreco(prod, qtd), descTipo, dv); });
    } else if (aba==='sob' && precoManual) {
      const base = parseFloat(precoManual.replace(',','.')) || 0;
      pc.forEach(p => { pv[p] = aplicaDesc(base, descTipo, dv); });
    }
    setPreview(pv);
  }, [aba, prodSel, qtd, prazos, prazoCustom, precoManual, descTipo, descVal, catalogo]);

  const togglePrazo = p => setPrazos(prev => prev.includes(p)?prev.filter(x=>x!==p):[...prev,p]);
  const prazosFinais = () => { const s = new Set([...prazos]); if (prazoCustom && parseInt(prazoCustom) > 0) s.add(parseInt(prazoCustom)); return [...s].sort((a,b)=>a-b); };

  const handleAdd = () => {
    const pf = prazosFinais();
    if (pf.length === 0) { toast('Selecione ao menos um prazo.','error'); return; }
    let idProd=null, nomeProd='', specProd='', fornProd='', precoBase=0;
    if (aba==='estoque') {
      if (!prodSel) { toast('Selecione um produto.','error'); return; }
      const prod = catalogo.find(p=>p.id===prodSel);
      if (prod.qtdEstoque === 0) { toast('⛔ Produto sem estoque! Use Sob Demanda.','error'); return; }
      const jaUsado = itens.filter(i=>i.idProd===prodSel&&i.prazo===pf[0]).reduce((s,i)=>s+i.quantidade,0);
      if (qtd > prod.qtdEstoque - jaUsado) { toast(`Estoque insuficiente. Disponível: ${prod.qtdEstoque - jaUsado} un.`,'error'); return; }
      idProd=prod.id; nomeProd=prod.nome; specProd=prod.spec; precoBase=lookupPreco(prod,qtd);
    } else {
      if (!nome.trim()) { toast('Informe o nome.','error'); return; }
      if (!precoManual) { toast('Informe o preço.','error'); return; }
      nomeProd=nome.trim(); specProd=spec.trim(); fornProd=fornecedor.trim();
      precoBase=parseFloat(precoManual.replace(',','.'))||0;
    }
    const dv = parseFloat(descVal.replace(',','.')) || 0;
    pf.forEach(prazo => {
      const precoFinal = aplicaDesc(precoBase, descTipo, dv);
      onAddItem({ id:uid(), idProd, nome:nomeProd, spec:specProd, fornecedor:fornProd,
        origem: aba==='estoque'?'Em Estoque':'Sob Demanda', quantidade:qtd, prazo, precoBase,
        descTipo, descValor:dv, precoFinal, valorMensal:precoFinal*qtd, valorTotal:precoFinal*qtd*prazo });
    });
    toast(`${nomeProd} adicionado!`,'success');
    setProdSel(''); setNome(''); setSpec(''); setFornecedor(''); setPrecoManual(''); setQtd(1); setPrazos([]); setPrazoCustom(''); setDescVal('');
  };

  const estoqueDoProd = prodSel ? catalogo.find(p=>p.id===prodSel)?.qtdEstoque??0 : 0;

  return (
    <div>
      {semEstoque.length > 0 && (
        <div className="ibox red" style={{marginBottom:12}}>
          <span>⛔</span>
          <div><strong>Sem estoque:</strong> {semEstoque.map(p=>p.nome).join(', ')}. Use <strong>Sob Demanda</strong> para incluí-los.</div>
        </div>
      )}
      <div className="card">
        <div className="card-title"><div className="icon">💻</div>Tipo de Atendimento</div>
        <div className="tabs" style={{marginBottom:14}}>
          <button className={`tab${aba==='estoque'?' active':''}`} onClick={()=>setAba('estoque')}>📦 Em Estoque</button>
          <button className={`tab${aba==='sob'?' active':''}`} onClick={()=>setAba('sob')}>✏️ Sob Demanda</button>
        </div>
        {aba==='estoque' ? (
          <div>
            <FG label="Produto do Catálogo" req>
              <select className="input" value={prodSel} onChange={e=>setProdSel(e.target.value)}>
                <option value="">— Selecione —</option>
                {disponiveis.map(p => <option key={p.id} value={p.id}>{p.nome} — {p.spec} ({p.qtdEstoque} un)</option>)}
              </select>
            </FG>
            {prodSel && (
              <div className="ibox blue" style={{marginTop:8, fontSize:11}}>
                <span>📦</span>
                <div style={{flex:1}}>
                  {(() => {
                    const prod = catalogo.find(p=>p.id===prodSel);
                    if (!prod) return null;
                    const precoAtual = lookupPreco(prod, qtd);
                    const faixaAtiva = getFaixaAtiva(prod, qtd);
                    const descPerc   = calcDescPerc(prod, faixaAtiva||{preco:precoAtual});
                    const faixaBase  = prod.faixas ? [...prod.faixas].sort((a,b)=>a.qtdMin-b.qtdMin)[0] : null;
                    return (
                      <>
                        <span>Estoque: <strong>{estoqueDoProd} un</strong> · Preço p/ {qtd}un: <strong>{R$(precoAtual)}/un/mês</strong></span>
                        {descPerc > 0 && (
                          <span style={{marginLeft:8, background:'var(--success-bg)', color:'var(--success)', borderRadius:20, padding:'1px 8px', fontWeight:700, fontSize:11}}>
                            🏷️ -{descPerc}% desconto volume
                          </span>
                        )}
                        {/* Mini tabela de faixas disponíveis */}
                        {prod.faixas && prod.faixas.length > 1 && (
                          <div style={{display:'flex', gap:6, marginTop:6, flexWrap:'wrap'}}>
                            {prod.faixas.map((f, i, arr) => {
                              const ativa = qtd >= f.qtdMin && (i===arr.length-1 || qtd <= f.qtdMax);
                              const isUlt = i === arr.length-1;
                              const d = faixaBase && i>0 && f.preco>0 ? Math.round((1-f.preco/faixaBase.preco)*100*10)/10 : 0;
                              return (
                                <div key={i} style={{
                                  padding:'3px 9px', borderRadius:20, fontSize:10, fontWeight:700,
                                  background: ativa ? 'var(--electric)' : 'rgba(37,99,235,.08)',
                                  color: ativa ? 'white' : 'var(--electric)',
                                  border: `1px solid ${ativa?'var(--electric)':'rgba(37,99,235,.2)'}`,
                                }}>
                                  {isUlt?`${f.qtdMin}+`:`${f.qtdMin}–${f.qtdMax}`} un → {R$(f.preco)}{d>0?` (-${d}%)`:''}
                                </div>
                              );
                            })}
                          </div>
                        )}
                      </>
                    );
                  })()}
                </div>
              </div>
            )}
          </div>
        ) : (
          <div>
            <div className="form-row c2" style={{marginBottom:10}}>
              <Inp label="Nome do Produto" req value={nome} onChange={e=>setNome(e.target.value)} placeholder="Ex: Notebook Asus Vivobook"/>
              <Inp label="Especificação" value={spec} onChange={e=>setSpec(e.target.value)} placeholder="Ex: i5 / 8GB / 512GB"/>
            </div>
            <div className="form-row" style={{marginBottom:10}}>
              <Inp label="Fornecedor / Onde adquirir" value={fornecedor} onChange={e=>setFornecedor(e.target.value)} placeholder="Ex: Kabum / Magazine Luiza"/>
            </div>
            <FG label="Preço Base / Unidade / Mês (R$)" req>
              <input className="input" style={{maxWidth:200}} placeholder="0,00" value={precoManual} onChange={e=>setPrecoManual(e.target.value)}/>
            </FG>
          </div>
        )}
      </div>
      <div className="card">
        <div className="card-title"><div className="icon">🔢</div>Quantidade</div>
        <div className="qty-stepper">
          <button className="qty-btn" onClick={()=>setQtd(q=>Math.max(1,q-1))}>−</button>
          <span className="qty-val">{qtd}</span>
          <button className="qty-btn" onClick={()=>setQtd(q=>q+1)}>+</button>
        </div>
        {aba==='estoque' && prodSel && qtd > estoqueDoProd && (
          <div className="ibox red" style={{marginTop:8,fontSize:11}}><span>⚠️</span>Qtd ({qtd}) supera o estoque ({estoqueDoProd} un).</div>
        )}
      </div>
      <div className="card">
        <div className="card-title"><div className="icon">🏷️</div>Desconto <span style={{fontSize:11,fontWeight:400,color:'var(--slate)'}}>(opcional)</span></div>
        <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
          <button className={`btn btn-sm${descTipo==='%'?' btn-primary':' btn-outline'}`} onClick={()=>setDescTipo('%')}>% Percentual</button>
          <button className={`btn btn-sm${descTipo==='$'?' btn-primary':' btn-outline'}`} onClick={()=>setDescTipo('$')}>R$ Nominal</button>
          <input className="input" style={{maxWidth:160}} placeholder={descTipo==='%'?'Ex: 5':'Ex: 20'} value={descVal} onChange={e=>setDescVal(e.target.value)}/>
        </div>
      </div>
      <div className="card">
        <div className="card-title"><div className="icon">📅</div>Prazo(s) do Contrato</div>
        <p style={{fontSize:11,color:'var(--slate)',marginBottom:10}}>Múltiplos prazos geram tabela comparativa no PDF.</p>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:12}}>
          {[1,3,6,12,24,36,48].map(p => (
            <div key={p} className={`prazo-chip${prazos.includes(p)?' sel':''}`} onClick={()=>togglePrazo(p)}>
              {prazos.includes(p)?'✓':''} {p}m
              {preview[p]!=null && <span style={{fontSize:10,color:'var(--success)',fontWeight:700}}>{R$(preview[p])}/un</span>}
            </div>
          ))}
        </div>
        <FG label="Prazo personalizado (meses)" hint="Ex: 2, 8, 18">
          <input className="input" style={{maxWidth:200}} type="number" min="1" placeholder="Ex: 18" value={prazoCustom} onChange={e=>setPrazoCustom(e.target.value)}/>
        </FG>
      </div>
      <button className="btn btn-success btn-lg" style={{width:'100%',marginBottom:14}} onClick={handleAdd}>＋ Adicionar à Lista</button>
      <div className="card">
        <div className="card-title"><div className="icon">📋</div>Itens do Orçamento ({itens.length})</div>
        {itens.length===0 ? (
          <div className="empty"><div className="eicon">📭</div><p>Nenhum item adicionado ainda.</p></div>
        ) : (
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {itens.map(item => {
              const descPerc = item.precoBase > 0 && item.precoFinal < item.precoBase
                ? Math.round((1-item.precoFinal/item.precoBase)*100*10)/10 : 0;
              return (
              <div key={item.id} className="produto-row">
                <div className="produto-info">
                  <div className="produto-nome">{item.nome}</div>
                  <div className="produto-sub">
                    {item.spec&&<>{item.spec} · </>}
                    <span className="badge badge-blue" style={{margin:'0 4px'}}>{item.prazo}m</span>
                    {item.origem==='Sob Demanda' && <span className="badge badge-ok" style={{marginRight:4}}>Sob Demanda</span>}
                    {item.fornecedor && <span style={{fontSize:10,color:'var(--slate)'}}>📍{item.fornecedor}</span>}
                  </div>
                  {/* Linha de preços clara: un × qtd = subtotal */}
                  <div style={{display:'flex',gap:6,marginTop:4,flexWrap:'wrap',alignItems:'center'}}>
                    <span style={{fontSize:12,fontWeight:800,color:'var(--navy)'}}>{R$(item.precoFinal)}<span style={{fontSize:10,fontWeight:400,color:'var(--slate)'}}>/un</span></span>
                    {descPerc > 0 && <span style={{fontSize:10,background:'var(--success-bg)',color:'var(--success)',borderRadius:20,padding:'1px 7px',fontWeight:700}}>-{descPerc}% vol.</span>}
                    <span style={{fontSize:11,color:'var(--slate-light)'}}>×</span>
                    <span style={{fontSize:11,fontWeight:700,color:'var(--slate)'}}>{item.quantidade} un</span>
                    <span style={{fontSize:11,color:'var(--slate-light)'}}>=</span>
                    <span style={{fontSize:12,fontWeight:800,color:'var(--electric)'}}>{R$(item.valorMensal)}<span style={{fontSize:10,fontWeight:400,color:'var(--slate)'}}>/mês</span></span>
                    {item.descValor>0 && <span style={{fontSize:10,color:'var(--warn)',borderRadius:20,padding:'1px 7px',background:'var(--warn-bg)',fontWeight:700}}>-{item.descTipo==='%'?`${item.descValor}%`:`R$${item.descValor}`} extra</span>}
                  </div>
                </div>
                <button className="btn btn-warn btn-icon" onClick={()=>setEditItem(item)} title="Editar">✏️</button>
                <button className="btn btn-ghost btn-icon" onClick={()=>onRemoveItem(item.id)} title="Remover">🗑️</button>
              </div>
            );})}
          </div>
        )}
      </div>
      <div className="nav-btns">
        <button className="btn btn-outline btn-lg" onClick={onBack}>← Voltar</button>
        <button className="btn btn-primary btn-lg" onClick={()=>{if(itens.length===0){toast('Adicione ao menos um produto.','error');return;}onNext();}}>Ver Resumo →</button>
      </div>
      {editItem && (
        <ModalEditarItem item={editItem}
          onSave={u=>{onEditItem(u);setEditItem(null);toast('Item atualizado!','success')}}
          onClose={()=>setEditItem(null)}/>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════
   PASSO 3 — RESUMO + PDF
══════════════════════════════════════════ */
function Passo3({cliente, itens, catalogo, setCatalogo, config, onBack, toast}) {
  const [pdfGerado, setPdfGerado] = useState(false);
  const [pdfUrl,    setPdfUrl]    = useState(null);
  const [loading,   setLoading]   = useState(false);
  const [id] = useState(orcId);

  const prazos   = [...new Set(itens.map(i=>i.prazo))].sort((a,b)=>a-b);
  const produtos = [...new Map(itens.map(i=>[i.idProd||i.nome, i])).values()];
  const totais   = prazos.map(p => { const ip=itens.filter(i=>i.prazo===p); const m=ip.reduce((s,i)=>s+i.valorMensal,0); return {prazo:p,mensal:m,total:m*p}; });

  const handlePDF = () => {
    setLoading(true);
    setTimeout(()=>{
      try {
        const doc = gerarPDF({id}, cliente, itens, config);
        const url = URL.createObjectURL(doc.output('blob'));
        setPdfUrl(url); setPdfGerado(true); toast('PDF gerado!','success');
      } catch(e) { toast('Erro ao gerar PDF.','error'); }
      finally { setLoading(false); }
    }, 500);
  };

  const handleFecharOrc = () => {
    const ag = {};
    itens.filter(i=>i.idProd).forEach(i=>{ ag[i.idProd] = Math.max(ag[i.idProd]||0, i.quantidade); });
    setCatalogo(prev => prev.map(p => ag[p.id] ? {...p, qtdEstoque:Math.max(0,p.qtdEstoque-ag[p.id])} : p));
    toast('✅ Orçamento fechado! Estoque atualizado.','success');
  };

  const handleDownload = () => {
    if(!pdfUrl) return;
    const a=document.createElement('a'); a.href=pdfUrl;
    a.download=`${id}_${(cliente.nomeFantasia||cliente.razaoSocial||'cliente').replace(/\s+/g,'-')}.pdf`;
    a.click();
  };

  const handleWhatsApp = () => {
    const msg = encodeURIComponent(
      `Olá, ${cliente.responsavel}! 😊\n\nSegue a proposta *${id}* referente à locação de notebooks.\n\n📊 ${prazos.length} opção(ões) de prazo para comparar!\n\n` +
      `Gerada em ${new Date().toLocaleDateString('pt-BR')}. Qualquer dúvida estou à disposição!\n\n` +
      `${config.responsavelNome||''}${config.responsavelCelular?'\n'+config.responsavelCelular:''}`
    );
    window.open(`https://wa.me/55${cliente.telefone.replace(/\D/g,'')}?text=${msg}`, '_blank');
  };

  return (
    <div>
      <div className="card" style={{background:'linear-gradient(135deg,var(--navy),var(--navy-light))',border:'none'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
          <div>
            <div style={{color:'rgba(255,255,255,.6)',fontSize:10,textTransform:'uppercase',letterSpacing:'.5px',marginBottom:3}}>Proposta</div>
            <div style={{color:'white',fontWeight:800,fontSize:20,letterSpacing:'-.3px'}}>{id}</div>
            <div style={{color:'rgba(255,255,255,.5)',fontSize:11,marginTop:3}}>Válida até {new Date(Date.now()+30*86400000).toLocaleDateString('pt-BR')}</div>
            {config.responsavelNome && (
              <div style={{color:'rgba(255,255,255,.7)',fontSize:12,marginTop:6,fontWeight:600}}>👤 {config.responsavelNome}{config.responsavelCelular&&` · ${config.responsavelCelular}`}</div>
            )}
          </div>
          <div style={{textAlign:'right'}}>
            <div style={{color:'rgba(255,255,255,.5)',fontSize:10}}>Emitida em</div>
            <div style={{color:'white',fontWeight:700,fontSize:13}}>{new Date().toLocaleDateString('pt-BR')}</div>
            <div style={{color:'rgba(255,255,255,.6)',fontSize:11,marginTop:4}}>{config.nomeEmpresa||'Urban Store'}</div>
          </div>
        </div>
      </div>

      <div className="card">
        <div className="card-title"><div className="icon">🏢</div>Cliente</div>
        <div style={{fontWeight:700,fontSize:14,color:'var(--navy)',marginBottom:4}}>{cliente.razaoSocial||cliente.nomeFantasia||'—'}</div>
        {cliente.cnpj&&<div style={{fontSize:11,color:'var(--slate)',marginBottom:6}}>CNPJ: {cliente.cnpj}</div>}
        <div className="divider" style={{margin:'8px 0'}}/>
        <div style={{fontSize:12,display:'flex',gap:14,flexWrap:'wrap'}}>
          <span>👤 {cliente.responsavel}</span>
          <span>✉️ {cliente.email}</span>
          <span>📱 {cliente.telefone}</span>
        </div>
      </div>

      <div className="card">
        <div className="card-title"><div className="icon">📊</div>Tabela Comparativa</div>
        <div style={{overflowX:'auto'}}>
          <table className="resumo-table">
            <thead><tr><th>Produto</th><th>Qtd</th>{prazos.map(p=><th key={p}>{p}m</th>)}</tr></thead>
            <tbody>
              {produtos.map(prod=>(
                <tr key={prod.idProd||prod.nome}>
                  <td>
                    <div style={{fontWeight:700,fontSize:11}}>{prod.nome}</div>
                    {prod.spec&&<div style={{fontSize:10,color:'var(--slate)'}}>{prod.spec}</div>}
                    {prod.origem==='Sob Demanda'&&<div style={{fontSize:10,color:'var(--success)'}}>Sob Demanda</div>}
                  </td>
                  <td style={{fontWeight:700}}>{prod.quantidade}</td>
                  {prazos.map(p=>{
                    const item=itens.find(i=>(i.idProd||i.nome)===(prod.idProd||prod.nome)&&i.prazo===p);
                    return <td key={p}>{item ? (() => {
                      const descP = item.precoBase>0&&item.precoFinal<item.precoBase
                        ? Math.round((1-item.precoFinal/item.precoBase)*100*10)/10 : 0;
                      return (
                        <div style={{lineHeight:1.7}}>
                          <div style={{fontWeight:800,color:'var(--navy)',fontSize:12}}>
                            {R$(item.precoFinal)}<span style={{fontSize:9,fontWeight:400,color:'var(--slate)'}}>/un</span>
                          </div>
                          {descP > 0 && (
                            <div style={{fontSize:9,background:'var(--success-bg)',color:'var(--success)',borderRadius:20,padding:'0px 6px',fontWeight:700,display:'inline-block'}}>-{descP}% vol.</div>
                          )}
                          <div style={{fontSize:10,color:'var(--slate)',fontWeight:600}}>{R$(item.valorMensal)}/mês</div>
                        </div>
                      );
                    })() : <span className="no-col">—</span>}</td>;
                  })}
                </tr>
              ))}
            </tbody>
            <tfoot>
              <tr><td colSpan={2}>Mensalidade Total</td>{totais.map(t=><td key={t.prazo} style={{fontWeight:700,color:'var(--electric)'}}>{R$(t.mensal)}</td>)}</tr>
              <tr><td colSpan={2}>Total do Contrato</td>{totais.map(t=><td key={t.prazo}>{R$(t.total)}</td>)}</tr>
            </tfoot>
          </table>
        </div>
      </div>

      {!pdfGerado ? (
        <div className="card" style={{textAlign:'center'}}>
          <div style={{fontSize:12,color:'var(--slate)',marginBottom:18}}>
            O PDF usará os dados configurados em ⚙️ (logo, nome do responsável, textos, etc.).
          </div>
          {!config.responsavelNome && (
            <div className="ibox warn" style={{marginBottom:14,textAlign:'left'}}>
              <span>⚠️</span> Você não configurou o responsável. O PDF sairá sem assinatura. Vá em <strong>⚙️ Configurações</strong>.
            </div>
          )}
          <div style={{display:'flex',gap:12,justifyContent:'center',flexWrap:'wrap'}}>
            <button className="btn btn-primary btn-xl" onClick={handlePDF} disabled={loading}>
              {loading?<><div className="spinner"/>Gerando...</>:'📄 Gerar PDF'}
            </button>
          </div>
        </div>
      ) : (
        <div className="card">
          <div className="pdf-success">
            <span className="big">📄</span>
            <h3>PDF Gerado!</h3>
            <p>Proposta <strong>{id}</strong> com logo e dados de <strong>{config.responsavelNome||'responsável'}</strong> — pronta!</p>
            <div className="pdf-btns">
              <button className="btn btn-primary btn-lg" onClick={handleDownload}>⬇️ Baixar PDF</button>
              <button className="btn btn-success btn-lg" onClick={handleWhatsApp}>💬 WhatsApp</button>
              <a href={pdfUrl} target="_blank" rel="noreferrer"><button className="btn btn-outline btn-lg">🔍 Visualizar</button></a>
              <button className="btn btn-warn btn-lg" onClick={handleFecharOrc}>✅ Fechar Orçamento</button>
            </div>
          </div>
        </div>
      )}

      <div className="nav-btns"><button className="btn btn-outline btn-lg" onClick={onBack}>← Voltar</button></div>
    </div>
  );
}

/* ══════════════════════════════════════════
   WIZARD
══════════════════════════════════════════ */
function TelaOrcamento({catalogo, setCatalogo, config, toast}) {
  const [step, setStep] = useState(1);
  const [cliente, setCliente] = useState(() => loadLS('nb_cliente', {cnpj:'',razaoSocial:'',nomeFantasia:'',statusReceita:'',responsavel:'',email:'',telefone:'',cidade:'',uf:''}));
  const [itens, setItens] = useState([]);
  useEffect(()=>{ saveLS('nb_cliente', cliente); }, [cliente]);
  const steps = [{n:1,label:'Cliente'},{n:2,label:'Produtos'},{n:3,label:'Resumo'}];
  return (
    <div>
      <div className="stepper-wrap">
        <div className="stepper">
          {steps.map(s=>{
            const est = step===s.n?'active':step>s.n?'done':'';
            return (<div key={s.n} className={`step-item ${est}`}><div className="step-circle">{step>s.n?'✓':s.n}</div><div className="step-label">{s.label}</div></div>);
          })}
        </div>
      </div>
      <div className="main">
        {step===1 && <Passo1 dados={cliente} onChange={p=>setCliente(v=>({...v,...p}))} onNext={()=>setStep(2)} toast={toast}/>}
        {step===2 && <Passo2 catalogo={catalogo} itens={itens}
          onAddItem={item=>setItens(p=>[...p,item])}
          onRemoveItem={id=>setItens(p=>p.filter(i=>i.id!==id))}
          onEditItem={u=>setItens(p=>p.map(i=>i.id===u.id?u:i))}
          onBack={()=>setStep(1)} onNext={()=>setStep(3)} toast={toast}/>}
        {step===3 && <Passo3 cliente={cliente} itens={itens} catalogo={catalogo} setCatalogo={setCatalogo} config={config} onBack={()=>setStep(2)} toast={toast}/>}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════
   APP ROOT
══════════════════════════════════════════ */
function App() {
  const [tela, setTela] = useState('orcamento');
  const [catalogo, setCatalogoBruto]   = useState(() => loadLS('nb_catalogo', CATALOGO_INICIAL));
  const [contratos, setContratosBruto] = useState(() => loadLS('nb_contratos', CONTRATOS_INICIAIS));
  const [config, setConfigBruto]       = useState(() => loadLS('nb_config', CONFIG_INICIAL));
  const { toasts, toast } = useToast();

  const setCatalogo  = fn => { setCatalogoBruto(prev=>{ const n=typeof fn==='function'?fn(prev):fn; saveLS('nb_catalogo',n); return n; }); };
  const setContratos = fn => { setContratosBruto(prev=>{ const n=typeof fn==='function'?fn(prev):fn; saveLS('nb_contratos',n); return n; }); };
  const setConfig    = val => { setConfigBruto(val); saveLS('nb_config',val); };

  const limite = config.alertaDiasContrato || 30;
  const numContratosAlerta = contratos.filter(c => diasParaVencer(c.inicio,c.meses) <= limite).length;
  const numEstoqueAlerta   = catalogo.filter(p => p.qtdEstoque===0 || p.qtdEstoque<=(config.alertaEstoqueMinimoQtd||3)).length;

  return (
    <div>
      <div className="topbar">
        <div className="topbar-brand">
          <div className="dot">💻</div>
          {config.nomeEmpresa || 'NB Diogo'}
        </div>
        <div className="topbar-nav">
          <button className={`topbar-btn${tela==='orcamento'?' active':''}`} onClick={()=>setTela('orcamento')}>📄 <span>Orçamento</span></button>
          <button className={`topbar-btn${tela==='contratos'?' active':''}`} onClick={()=>setTela('contratos')}>
            📋 <span>Contratos</span>
            {numContratosAlerta > 0 && <div className="notif-dot"/>}
          </button>
          <button className={`topbar-btn${tela==='estoque'?' active':''}`} onClick={()=>setTela('estoque')}>
            📦 <span>Estoque</span>
            {numEstoqueAlerta > 0 && <div className="notif-dot"/>}
          </button>
          <button className={`topbar-btn${tela==='config'?' active':''}`} onClick={()=>setTela('config')}>⚙️ <span>Config</span></button>
        </div>
      </div>

      <AlertBanner catalogo={catalogo} contratos={contratos} config={config}/>

      {tela==='orcamento' && <TelaOrcamento catalogo={catalogo} setCatalogo={setCatalogo} config={config} toast={toast}/>}
      {tela==='contratos' && <TelaContratos contratos={contratos} setContratos={setContratos} config={config} toast={toast}/>}
      {tela==='estoque'   && <TelaEstoque   catalogo={catalogo} setCatalogo={setCatalogo}   config={config} toast={toast}/>}
      {tela==='config'    && <TelaConfiguracoes config={config} setConfig={setConfig} toast={toast}/>}

      <Toast toasts={toasts}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

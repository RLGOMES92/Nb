/* ══════════════════════════════════════════
   PASSO 1 — CLIENTE
══════════════════════════════════════════ */
function Passo1({dados,onChange,onNext,toast}){
  const [loading,setLoading]=useState(false);
  const [cnpjStatus,setCnpjStatus]=useState(null);
  const [errors,setErrors]=useState({});
  const consultarCNPJ=async()=>{
    const raw=dados.cnpj.replace(/\D/g,'');
    if(raw.length!==14){toast('CNPJ precisa ter 14 dígitos.','error');return;}
    setLoading(true);setCnpjStatus(null);
    try{
      const res=await fetch(`https://brasilapi.com.br/api/cnpj/v1/${raw}`);
      if(!res.ok) throw new Error();
      const d=await res.json();
      const telFmt=d.ddd_telefone_1?formatPhone(d.ddd_telefone_1.replace(/\D/g,'')):'';;
      onChange({razaoSocial:d.razao_social||'',nomeFantasia:d.nome_fantasia||'',statusReceita:d.descricao_situacao_cadastral||'ATIVA',email:dados.email||d.email||'',telefone:dados.telefone||telFmt,cidade:d.municipio||'',uf:d.uf||''});
      setCnpjStatus('ok');toast('Empresa encontrada!','success');
    }catch{setCnpjStatus('error');toast('CNPJ não encontrado. Preencha manualmente.','error');}
    finally{setLoading(false);}
  };
  const validate=()=>{
    const e={};
    if(!dados.cnpj||dados.cnpj.replace(/\D/g,'').length<14) e.cnpj='CNPJ obrigatório (14 dígitos)';
    if(!dados.responsavel?.trim()) e.responsavel='Campo obrigatório';
    if(!dados.email?.trim()) e.email='Campo obrigatório';
    else if(!/\S+@\S+\.\S+/.test(dados.email)) e.email='E-mail inválido';
    if(!dados.telefone?.trim()) e.telefone='Campo obrigatório';
    setErrors(e);return Object.keys(e).length===0;
  };
  const statusMap={'ATIVA':'badge-ok','BAIXADA':'badge-err','SUSPENSA':'badge-warn','INAPTA':'badge-err'};
  return(
    <div>
      <div className="card">
        <div className="card-title"><div className="icon">🏢</div>Dados da Empresa</div>
        <div className="form-row" style={{marginBottom:10}}>
          <FG label="CNPJ" req err={errors.cnpj}>
            <div className="input-group">
              <input className={`input${errors.cnpj?' err':''}`} placeholder="00.000.000/0001-00" value={dados.cnpj} onChange={e=>onChange({cnpj:formatCNPJ(e.target.value)})} onKeyDown={e=>e.key==='Enter'&&consultarCNPJ()}/>
              <button className="btn btn-primary" onClick={consultarCNPJ} disabled={loading} style={{flexShrink:0}}>{loading?<><div className="spinner"/>Buscando</>:'🔍 Consultar'}</button>
            </div>
          </FG>
        </div>
        {cnpjStatus==='ok'&&dados.razaoSocial&&(
          <div className="ibox green" style={{marginBottom:12}}>
            <span>✅</span>
            <div><strong>{dados.razaoSocial}</strong>{dados.nomeFantasia&&` — ${dados.nomeFantasia}`}
              {dados.statusReceita&&<span className={`badge ${statusMap[dados.statusReceita?.toUpperCase()]||'badge-warn'}`} style={{marginLeft:8}}>{dados.statusReceita}</span>}
              {dados.cidade&&<><br/><span style={{fontSize:11,color:'#065f46'}}>📍 {dados.cidade}/{dados.uf}</span></>}
            </div>
          </div>
        )}
        {cnpjStatus==='error'&&<div className="ibox warn" style={{marginBottom:12}}><span>⚠️</span> CNPJ não encontrado. Preencha manualmente.</div>}
        <div className="form-row c2">
          <Inp label="Razão Social" value={dados.razaoSocial} onChange={e=>onChange({razaoSocial:e.target.value})} readOnly={cnpjStatus==='ok'}/>
          <Inp label="Nome Fantasia" value={dados.nomeFantasia} onChange={e=>onChange({nomeFantasia:e.target.value})} readOnly={cnpjStatus==='ok'}/>
        </div>
      </div>
      <div className="card">
        <div className="card-title"><div className="icon">👤</div>Contato do Responsável</div>
        <div className="form-row"><Inp label="Nome do Responsável" req value={dados.responsavel} onChange={e=>onChange({responsavel:e.target.value})} err={errors.responsavel}/></div>
        <div className="form-row c2">
          <Inp label="E-mail" req type="email" value={dados.email} onChange={e=>onChange({email:e.target.value})} err={errors.email}/>
          <FG label="Telefone / WhatsApp" req err={errors.telefone}>
            <input className={`input${errors.telefone?' err':''}`} value={dados.telefone} onChange={e=>onChange({telefone:formatPhone(e.target.value)})} placeholder="(11) 99999-0000"/>
          </FG>
        </div>
      </div>
      <div className="nav-btns"><div/><button className="btn btn-primary btn-lg" onClick={()=>{if(validate())onNext();}}>Próximo: Produtos →</button></div>
    </div>
  );
}

/* ══════════════════════════════════════════
   PASSO 2 — PRODUTOS
══════════════════════════════════════════ */
function Passo2({catalogo,itens,onAddItem,onRemoveItem,onEditItem,onBack,onNext,toast}){
  const [aba,setAba]=useState('estoque');
  const [prodSel,setProdSel]=useState('');
  const [nome,setNome]=useState('');
  const [spec,setSpec]=useState('');
  const [fornecedor,setFornecedor]=useState('');
  const [precoManual,setPrecoManual]=useState('');
  const [qtd,setQtd]=useState(1);
  const [prazos,setPrazos]=useState([]);
  const [prazoCustom,setPrazoCustom]=useState('');
  const [descTipo,setDescTipo]=useState('%');
  const [descVal,setDescVal]=useState('');
  const [preview,setPreview]=useState({});
  const [editItem,setEditItem]=useState(null);
  const disponiveis=catalogo.filter(p=>p.qtdEstoque>0);
  const semEstoque=catalogo.filter(p=>p.qtdEstoque===0);
  useEffect(()=>{
    const dv=parseFloat(descVal.replace(',','.'))||0;
    const pv={};
    const pc=[...new Set([...prazos,...(prazoCustom?[parseInt(prazoCustom)]:[])])].filter(Boolean);
    if(aba==='estoque'&&prodSel){
      const prod=catalogo.find(p=>p.id===prodSel);
      if(prod) pc.forEach(p=>{pv[p]=aplicaDesc(lookupPreco(prod,qtd),descTipo,dv);});
    }else if(aba==='sob'&&precoManual){
      const base=parseFloat(precoManual.replace(',','.'))||0;
      pc.forEach(p=>{pv[p]=aplicaDesc(base,descTipo,dv);});
    }
    setPreview(pv);
  },[aba,prodSel,qtd,prazos,prazoCustom,precoManual,descTipo,descVal,catalogo]);
  const togglePrazo=p=>setPrazos(prev=>prev.includes(p)?prev.filter(x=>x!==p):[...prev,p]);
  const prazosFinais=()=>{const s=new Set([...prazos]);if(prazoCustom&&parseInt(prazoCustom)>0) s.add(parseInt(prazoCustom));return[...s].sort((a,b)=>a-b);};
  const handleAdd=()=>{
    const pf=prazosFinais();
    if(pf.length===0){toast('Selecione ao menos um prazo.','error');return;}
    let idProd=null,nomeProd='',specProd='',fornProd='',precoBase=0;
    if(aba==='estoque'){
      if(!prodSel){toast('Selecione um produto.','error');return;}
      const prod=catalogo.find(p=>p.id===prodSel);
      if(prod.qtdEstoque===0){toast('⛔ Produto sem estoque! Use Sob Demanda.','error');return;}
      const jaUsado=itens.filter(i=>i.idProd===prodSel&&i.prazo===pf[0]).reduce((s,i)=>s+i.quantidade,0);
      if(qtd>prod.qtdEstoque-jaUsado){toast(`Estoque insuficiente. Disponível: ${prod.qtdEstoque-jaUsado} un.`,'error');return;}
      idProd=prod.id;nomeProd=prod.nome;specProd=prod.spec;precoBase=lookupPreco(prod,qtd);
    }else{
      if(!nome.trim()){toast('Informe o nome.','error');return;}
      if(!precoManual){toast('Informe o preço.','error');return;}
      nomeProd=nome.trim();specProd=spec.trim();fornProd=fornecedor.trim();
      precoBase=parseFloat(precoManual.replace(',','.'))||0;
    }
    const dv=parseFloat(descVal.replace(',','.'))||0;
    pf.forEach(prazo=>{
      const precoFinal=aplicaDesc(precoBase,descTipo,dv);
      onAddItem({id:uid(),idProd,nome:nomeProd,spec:specProd,fornecedor:fornProd,origem:aba==='estoque'?'Em Estoque':'Sob Demanda',quantidade:qtd,prazo,precoBase,descTipo,descValor:dv,precoFinal,valorMensal:precoFinal*qtd,valorTotal:precoFinal*qtd*prazo});
    });
    toast(`${nomeProd} adicionado!`,'success');
    setProdSel('');setNome('');setSpec('');setFornecedor('');setPrecoManual('');setQtd(1);setPrazos([]);setPrazoCustom('');setDescVal('');
  };
  const estoqueDoProd=prodSel?catalogo.find(p=>p.id===prodSel)?.qtdEstoque??0:0;
  const prodSelecionado=prodSel?catalogo.find(p=>p.id===prodSel):null;
  return(
    <div>
      {semEstoque.length>0&&(
        <div className="ibox red" style={{marginBottom:12}}>
          <span>⛔</span><div><strong>Sem estoque:</strong> {semEstoque.map(p=>p.nome).join(', ')}. Use <strong>Sob Demanda</strong>.</div>
        </div>
      )}
      <div className="card">
        <div className="card-title"><div className="icon">💻</div>Tipo de Atendimento</div>
        <div className="tabs" style={{marginBottom:14}}>
          <button className={`tab${aba==='estoque'?' active':''}`} onClick={()=>setAba('estoque')}>📦 Em Estoque</button>
          <button className={`tab${aba==='sob'?' active':''}`} onClick={()=>setAba('sob')}>✏️ Sob Demanda</button>
        </div>
        {aba==='estoque'?(
          <div>
            <FG label="Produto do Catálogo" req>
              <select className="input" value={prodSel} onChange={e=>setProdSel(e.target.value)}>
                <option value="">— Selecione —</option>
                {disponiveis.map(p=><option key={p.id} value={p.id}>{p.nome} — {p.spec} ({p.qtdEstoque} un)</option>)}
              </select>
            </FG>
            {prodSel&&prodSelecionado&&(
              <div className="ibox blue" style={{marginTop:8,fontSize:11}}>
                <span>📦</span>
                <div>
                  Estoque: <strong>{estoqueDoProd} un</strong> · Preço p/ {qtd}un: <strong>{R$(lookupPreco(prodSelecionado,qtd))}/un/mês</strong>
                  {prodSelecionado.descontos?.desc5>0&&qtd>=5&&<> · <span style={{color:'var(--success)',fontWeight:700}}>Desconto {qtd>=10?prodSelecionado.descontos.desc10:prodSelecionado.descontos.desc5}% aplicado!</span></>}
                </div>
              </div>
            )}
          </div>
        ):(
          <div>
            <div className="form-row c2" style={{marginBottom:10}}>
              <Inp label="Nome do Produto" req value={nome} onChange={e=>setNome(e.target.value)} placeholder="Ex: Notebook Asus Vivobook"/>
              <Inp label="Especificação" value={spec} onChange={e=>setSpec(e.target.value)} placeholder="Ex: i5 / 8GB / 512GB"/>
            </div>
            <div className="form-row" style={{marginBottom:10}}>
              <Inp label="Fornecedor / Onde adquirir" value={fornecedor} onChange={e=>setFornecedor(e.target.value)} placeholder="Ex: Kabum / Magazine Luiza"/>
            </div>
            <FG label="Preço Base / Unidade / Mês (R$)" req>
              <input className="input" style={{maxWidth:200}} placeholder="0,00" value={precoManual} onChange={e=>setPrecoManual(e.target.value)}/>
            </FG>
          </div>
        )}
      </div>
      <div className="card">
        <div className="card-title"><div className="icon">🔢</div>Quantidade</div>
        <div className="qty-stepper">
          <button className="qty-btn" onClick={()=>setQtd(q=>Math.max(1,q-1))}>−</button>
          <span className="qty-val">{qtd}</span>
          <button className="qty-btn" onClick={()=>setQtd(q=>q+1)}>+</button>
        </div>
        {aba==='estoque'&&prodSel&&qtd>estoqueDoProd&&<div className="ibox red" style={{marginTop:8,fontSize:11}}><span>⚠️</span>Qtd ({qtd}) supera o estoque ({estoqueDoProd} un).</div>}
      </div>
      <div className="card">
        <div className="card-title"><div className="icon">🏷️</div>Desconto Adicional <span style={{fontSize:11,fontWeight:400,color:'var(--slate)'}}>(opcional — sobre o preço da faixa)</span></div>
        <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
          <button className={`btn btn-sm${descTipo==='%'?' btn-primary':' btn-outline'}`} onClick={()=>setDescTipo('%')}>% Percentual</button>
          <button className={`btn btn-sm${descTipo==='$'?' btn-primary':' btn-outline'}`} onClick={()=>setDescTipo('$')}>R$ Nominal</button>
          <input className="input" style={{maxWidth:160}} placeholder={descTipo==='%'?'Ex: 5':'Ex: 20'} value={descVal} onChange={e=>setDescVal(e.target.value)}/>
        </div>
      </div>
      <div className="card">
        <div className="card-title"><div className="icon">📅</div>Prazo(s) do Contrato</div>
        <p style={{fontSize:11,color:'var(--slate)',marginBottom:10}}>Múltiplos prazos geram tabela comparativa no PDF.</p>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:12}}>
          {[1,3,6,12,24,36,48].map(p=>(
            <div key={p} className={`prazo-chip${prazos.includes(p)?' sel':''}`} onClick={()=>togglePrazo(p)}>
              {prazos.includes(p)?'✓':''} {p}m
              {preview[p]!=null&&<span style={{fontSize:10,color:'var(--success)',fontWeight:700}}>{R$(preview[p])}/un</span>}
            </div>
          ))}
        </div>
        <FG label="Prazo personalizado (meses)" hint="Ex: 2, 8, 18">
          <input className="input" style={{maxWidth:200}} type="number" min="1" placeholder="Ex: 18" value={prazoCustom} onChange={e=>setPrazoCustom(e.target.value)}/>
        </FG>
      </div>
      <button className="btn btn-success btn-lg" style={{width:'100%',marginBottom:14}} onClick={handleAdd}>＋ Adicionar à Lista</button>
      <div className="card">
        <div className="card-title"><div className="icon">📋</div>Itens do Orçamento ({itens.length})</div>
        {itens.length===0?(
          <div className="empty"><div className="eicon">📭</div><p>Nenhum item adicionado ainda.</p></div>
        ):(
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {itens.map(item=>(
              <div key={item.id} className="produto-row">
                <div className="produto-info">
                  <div className="produto-nome">{item.nome}</div>
                  <div className="produto-sub">
                    {item.spec&&<>{item.spec} · </>}Qtd: {item.quantidade} ·
                    <span className="badge badge-blue" style={{margin:'0 4px'}}>{item.prazo}m</span>
                    {item.origem==='Sob Demanda'&&<span className="badge badge-ok" style={{marginRight:4}}>Sob Demanda</span>}
                    {item.fornecedor&&<span style={{fontSize:10,color:'var(--slate)'}}>📍{item.fornecedor}</span>}
                    {item.descValor>0&&<span style={{fontSize:10,color:'var(--warn)'}}> desc.{item.descTipo==='%'?`${item.descValor}%`:`R$${item.descValor}`}</span>}
                  </div>
                </div>
                <div className="produto-valor">
                  {/* CORREÇÃO: mostra preço unitário */}
                  <div className="val">{R$(item.precoFinal)}<span style={{fontSize:9,fontWeight:400,color:'var(--slate)'}}>/un</span></div>
                  <div className="sub">{R$(item.valorMensal)}/mês</div>
                </div>
                <button className="btn btn-warn btn-icon" onClick={()=>setEditItem(item)}>✏️</button>
                <button className="btn btn-ghost btn-icon" onClick={()=>onRemoveItem(item.id)}>🗑️</button>
              </div>
            ))}
          </div>
        )}
      </div>
      <div className="nav-btns">
        <button className="btn btn-outline btn-lg" onClick={onBack}>← Voltar</button>
        <button className="btn btn-primary btn-lg" onClick={()=>{if(itens.length===0){toast('Adicione ao menos um produto.','error');return;}onNext();}}>Ver Resumo →</button>
      </div>
      {editItem&&<ModalEditarItem item={editItem} onSave={u=>{onEditItem(u);setEditItem(null);toast('Item atualizado!','success')}} onClose={()=>setEditItem(null)}/>}
    </div>
  );
}

/* ══════════════════════════════════════════
   PASSO 3 — RESUMO + PDF
══════════════════════════════════════════ */
function Passo3({cliente,itens,catalogo,setCatalogo,config,onBack,toast}){
  const [pdfGerado,setPdfGerado]=useState(false);
  const [pdfUrl,setPdfUrl]=useState(null);
  const [loading,setLoading]=useState(false);
  const [id]=useState(orcId);
  const prazos=[...new Set(itens.map(i=>i.prazo))].sort((a,b)=>a-b);
  const produtos=[...new Map(itens.map(i=>[i.idProd||i.nome,i])).values()];
  const totais=prazos.map(p=>{const ip=itens.filter(i=>i.prazo===p);const m=ip.reduce((s,i)=>s+i.valorMensal,0);return{prazo:p,mensal:m,total:m*p};});
  const handlePDF=()=>{
    setLoading(true);
    setTimeout(()=>{
      try{const doc=gerarPDF({id},cliente,itens,config);const url=URL.createObjectURL(doc.output('blob'));setPdfUrl(url);setPdfGerado(true);toast('PDF gerado!','success');}
      catch(e){toast('Erro ao gerar PDF.','error');}
      finally{setLoading(false);}
    },500);
  };
  const handleFecharOrc=()=>{
    const ag={};
    itens.filter(i=>i.idProd).forEach(i=>{ag[i.idProd]=Math.max(ag[i.idProd]||0,i.quantidade);});
    setCatalogo(prev=>prev.map(p=>ag[p.id]?{...p,qtdEstoque:Math.max(0,p.qtdEstoque-ag[p.id])}:p));
    toast('✅ Orçamento fechado! Estoque atualizado.','success');
  };
  const handleDownload=()=>{
    if(!pdfUrl) return;
    const a=document.createElement('a');a.href=pdfUrl;
    a.download=`${id}_${(cliente.nomeFantasia||cliente.razaoSocial||'cliente').replace(/\s+/g,'-')}.pdf`;
    a.click();
  };
  const handleWhatsApp=()=>{
    const msg=encodeURIComponent(`Olá, ${cliente.responsavel}! 😊\n\nSegue a proposta *${id}* referente à locação de notebooks.\n\n📊 ${prazos.length} opção(ões) de prazo para comparar!\n\nGerada em ${new Date().toLocaleDateString('pt-BR')}. Qualquer dúvida estou à disposição!\n\n${config.responsavelNome||''}${config.responsavelCelular?'\n'+config.responsavelCelular:''}`);
    window.open(`https://wa.me/55${cliente.telefone.replace(/\D/g,'')}?text=${msg}`,'_blank');
  };
  return(
    <div>
      <div className="card" style={{background:'linear-gradient(135deg,var(--navy),var(--navy-light))',border:'none'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
          <div>
            <div style={{color:'rgba(255,255,255,.6)',fontSize:10,textTransform:'uppercase',letterSpacing:'.5px',marginBottom:3}}>Proposta</div>
            <div style={{color:'white',fontWeight:800,fontSize:20,letterSpacing:'-.3px'}}>{id}</div>
            <div style={{color:'rgba(255,255,255,.5)',fontSize:11,marginTop:3}}>Válida até {new Date(Date.now()+30*86400000).toLocaleDateString('pt-BR')}</div>
            {config.responsavelNome&&<div style={{color:'rgba(255,255,255,.7)',fontSize:12,marginTop:6,fontWeight:600}}>👤 {config.responsavelNome}{config.responsavelCelular&&` · ${config.responsavelCelular}`}</div>}
          </div>
          <div style={{textAlign:'right'}}>
            <div style={{color:'rgba(255,255,255,.5)',fontSize:10}}>Emitida em</div>
            <div style={{color:'white',fontWeight:700,fontSize:13}}>{new Date().toLocaleDateString('pt-BR')}</div>
            <div style={{color:'rgba(255,255,255,.6)',fontSize:11,marginTop:4}}>{config.nomeEmpresa||'Urban Store'}</div>
          </div>
        </div>
      </div>
      <div className="card">
        <div className="card-title"><div className="icon">🏢</div>Cliente</div>
        <div style={{fontWeight:700,fontSize:14,color:'var(--navy)',marginBottom:4}}>{cliente.razaoSocial||cliente.nomeFantasia||'—'}</div>
        {cliente.cnpj&&<div style={{fontSize:11,color:'var(--slate)',marginBottom:6}}>CNPJ: {cliente.cnpj}</div>}
        <div className="divider" style={{margin:'8px 0'}}/>
        <div style={{fontSize:12,display:'flex',gap:14,flexWrap:'wrap'}}>
          <span>👤 {cliente.responsavel}</span><span>✉️ {cliente.email}</span><span>📱 {cliente.telefone}</span>
        </div>
      </div>
      <div className="card">
        <div className="card-title"><div className="icon">📊</div>Tabela Comparativa</div>
        <div style={{overflowX:'auto'}}>
          <table className="resumo-table">
            <thead><tr><th>Produto</th><th>Qtd</th>{prazos.map(p=><th key={p}>{p}m</th>)}</tr></thead>
            <tbody>
              {produtos.map(prod=>(
                <tr key={prod.idProd||prod.nome}>
                  <td>
                    <div style={{fontWeight:700,fontSize:11}}>{prod.nome}</div>
                    {prod.spec&&<div style={{fontSize:10,color:'var(--slate)'}}>{prod.spec}</div>}
                    {prod.origem==='Sob Demanda'&&<div style={{fontSize:10,color:'var(--success)'}}>Sob Demanda</div>}
                  </td>
                  <td style={{fontWeight:700}}>{prod.quantidade}</td>
                  {prazos.map(p=>{
                    const item=itens.find(i=>(i.idProd||i.nome)===(prod.idProd||prod.nome)&&i.prazo===p);
                    return<td key={p}>{item?(
                      <>
                        {/* CORREÇÃO: preço unitário em destaque, mensal abaixo */}
                        <div style={{fontWeight:700,color:'var(--navy)',fontSize:11}}>{R$(item.precoFinal)}<span style={{fontSize:9,fontWeight:400,color:'var(--slate)'}}>/un</span></div>
                        <div style={{fontSize:9,color:'var(--slate)'}}>{R$(item.valorMensal)}/mês</div>
                      </>
                    ):<span className="no-col">—</span>}</td>;
                  })}
                </tr>
              ))}
            </tbody>
            <tfoot>
              {/* Só aparece mensalidade total e valor total aqui — sem duplicar */}
              <tr><td colSpan={2}>Mensalidade Total</td>{totais.map(t=><td key={t.prazo} style={{fontWeight:700,color:'var(--electric)'}}>{R$(t.mensal)}</td>)}</tr>
              <tr><td colSpan={2}>Total do Contrato</td>{totais.map(t=><td key={t.prazo}>{R$(t.total)}</td>)}</tr>
            </tfoot>
          </table>
        </div>
      </div>
      {!pdfGerado?(
        <div className="card" style={{textAlign:'center'}}>
          <div style={{fontSize:12,color:'var(--slate)',marginBottom:18}}>O PDF usa os dados e logo configurados em ⚙️.</div>
          {!config.responsavelNome&&<div className="ibox warn" style={{marginBottom:14,textAlign:'left'}}><span>⚠️</span> Responsável não configurado. PDF sairá sem assinatura.</div>}
          <button className="btn btn-primary btn-xl" onClick={handlePDF} disabled={loading}>{loading?<><div className="spinner"/>Gerando...</>:'📄 Gerar PDF'}</button>
        </div>
      ):(
        <div className="card">
          <div className="pdf-success">
            <span className="big">📄</span>
            <h3>PDF Gerado!</h3>
            <p>Proposta <strong>{id}</strong> com logo e dados de <strong>{config.responsavelNome||'responsável'}</strong></p>
            <div className="pdf-btns">
              <button className="btn btn-primary btn-lg" onClick={handleDownload}>⬇️ Baixar PDF</button>
              <button className="btn btn-success btn-lg" onClick={handleWhatsApp}>💬 WhatsApp</button>
              <a href={pdfUrl} target="_blank" rel="noreferrer"><button className="btn btn-outline btn-lg">🔍 Visualizar</button></a>
              <button className="btn btn-warn btn-lg" onClick={handleFecharOrc}>✅ Fechar Orçamento</button>
            </div>
          </div>
        </div>
      )}
      <div className="nav-btns"><button className="btn btn-outline btn-lg" onClick={onBack}>← Voltar</button></div>
    </div>
  );
}

/* ══════════════════════════════════════════
   WIZARD + APP ROOT
══════════════════════════════════════════ */
function TelaOrcamento({catalogo,setCatalogo,config,toast}){
  const [step,setStep]=useState(1);
  const [cliente,setCliente]=useState(()=>loadLS('nb_cliente',{cnpj:'',razaoSocial:'',nomeFantasia:'',statusReceita:'',responsavel:'',email:'',telefone:'',cidade:'',uf:''}));
  const [itens,setItens]=useState([]);
  useEffect(()=>{saveLS('nb_cliente',cliente);},[cliente]);
  const steps=[{n:1,label:'Cliente'},{n:2,label:'Produtos'},{n:3,label:'Resumo'}];
  return(
    <div>
      <div className="stepper-wrap">
        <div className="stepper">
          {steps.map(s=>{const est=step===s.n?'active':step>s.n?'done':'';return(
            <div key={s.n} className={`step-item ${est}`}><div className="step-circle">{step>s.n?'✓':s.n}</div><div className="step-label">{s.label}</div></div>
          );})}
        </div>
      </div>
      <div className="main">
        {step===1&&<Passo1 dados={cliente} onChange={p=>setCliente(v=>({...v,...p}))} onNext={()=>setStep(2)} toast={toast}/>}
        {step===2&&<Passo2 catalogo={catalogo} itens={itens} onAddItem={item=>setItens(p=>[...p,item])} onRemoveItem={id=>setItens(p=>p.filter(i=>i.id!==id))} onEditItem={u=>setItens(p=>p.map(i=>i.id===u.id?u:i))} onBack={()=>setStep(1)} onNext={()=>setStep(3)} toast={toast}/>}
        {step===3&&<Passo3 cliente={cliente} itens={itens} catalogo={catalogo} setCatalogo={setCatalogo} config={config} onBack={()=>setStep(2)} toast={toast}/>}
      </div>
    </div>
  );
}

function App(){
  const [tela,setTela]=useState('orcamento');
  const [catalogo,setCatalogoBruto]=useState(()=>loadLS('nb_catalogo',CATALOGO_INICIAL));
  const [contratos,setContratosBruto]=useState(()=>loadLS('nb_contratos',CONTRATOS_INICIAIS));
  const [config,setConfigBruto]=useState(()=>loadLS('nb_config',CONFIG_INICIAL));
  const {toasts,toast}=useToast();
  const setCatalogo=fn=>{setCatalogoBruto(prev=>{const n=typeof fn==='function'?fn(prev):fn;saveLS('nb_catalogo',n);return n;});};
  const setContratos=fn=>{setContratosBruto(prev=>{const n=typeof fn==='function'?fn(prev):fn;saveLS('nb_contratos',n);return n;});};
  const setConfig=val=>{setConfigBruto(val);saveLS('nb_config',val);};
  const limite=config.alertaDiasContrato||30;
  const numContratosAlerta=contratos.filter(c=>diasParaVencer(c.inicio,c.meses)<=limite).length;
  const numEstoqueAlerta=catalogo.filter(p=>p.qtdEstoque===0||p.qtdEstoque<=(config.alertaEstoqueMinimoQtd||3)).length;
  return(
    <div>
      <div className="topbar">
        <div className="topbar-brand"><div className="dot">💻</div>{config.nomeEmpresa||'NB Diogo'}</div>
        <div className="topbar-nav">
          <button className={`topbar-btn${tela==='orcamento'?' active':''}`} onClick={()=>setTela('orcamento')}>📄 <span>Orçamento</span></button>
          <button className={`topbar-btn${tela==='contratos'?' active':''}`} onClick={()=>setTela('contratos')}>📋 <span>Contratos</span>{numContratosAlerta>0&&<div className="notif-dot"/>}</button>
          <button className={`topbar-btn${tela==='estoque'?' active':''}`} onClick={()=>setTela('estoque')}>📦 <span>Estoque</span>{numEstoqueAlerta>0&&<div className="notif-dot"/>}</button>
          <button className={`topbar-btn${tela==='config'?' active':''}`} onClick={()=>setTela('config')}>⚙️ <span>Config</span></button>
        </div>
      </div>
      <AlertBanner catalogo={catalogo} contratos={contratos} config={config}/>
      {tela==='orcamento'&&<TelaOrcamento catalogo={catalogo} setCatalogo={setCatalogo} config={config} toast={toast}/>}
      {tela==='contratos'&&<TelaContratos contratos={contratos} setContratos={setContratos} config={config} toast={toast}/>}
      {tela==='estoque'&&<TelaEstoque catalogo={catalogo} setCatalogo={setCatalogo} config={config} toast={toast}/>}
      {tela==='config'&&<TelaConfiguracoes config={config} setConfig={setConfig} toast={toast}/>}
      <Toast toasts={toasts}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
